kind = "web"
previewPath = "/"
title = "GEOscore"
version = "1.0.0"
id = "artifacts/geoscore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22117

[services.development]
run = "pnpm --filter @workspace/geoscore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/geoscore", "run", "build" ]

[services.production.run]
args = ["pnpm", "--filter", "@workspace/geoscore", "run", "serve"]

[services.env]
PORT = "22117"
BASE_PATH = "/"
